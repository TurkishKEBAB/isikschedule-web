# Proje Bilgileri
sonar.projectKey=isikschedule-web
sonar.projectName=IsikSchedule Web
sonar.projectVersion=1.0

# Yerel SonarQube Sunucusu
sonar.host.url=http://localhost:9000

# Kaynak Kodlar (frontend + backend)
sonar.sources=frontend/app,backend/app

# Dışlanan Dosya/Klasörler
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/migrations/**,\
  **/package-lock.json

# TypeScript/JavaScript Ayarları
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Python Ayarları
sonar.python.version=3.11

# Encoding
sonar.sourceEncoding=UTF-8
