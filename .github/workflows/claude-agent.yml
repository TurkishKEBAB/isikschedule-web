name: Claude Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-agent-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    name: Run Claude
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'agent:claude') ||
      (github.event_name == 'issues' && github.event.action == 'opened' && (contains(github.event.issue.title, '@claude') || contains(github.event.issue.body, '@claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          base_branch: master
          branch_prefix: claude/
          label_trigger: agent:claude
          trigger_phrase: "@claude"
          claude_args: |
            --max-turns 10
